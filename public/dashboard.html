<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics · Mijn Website</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:        #ffffff;
  --bg2:       #fafafa;
  --bg3:       #f5f5f5;
  --border:    #e8e8e8;
  --border2:   #f0f0f0;
  --text:      #0a0a0a;
  --text2:     #6b6b6b;
  --text3:     #adadad;
  --accent:    #0a0a0a;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --red:       #dc2626;
  --red-bg:    #fef2f2;
  --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --radius:    10px;
}

[data-theme="dark"] {
  --bg:        #111111;
  --bg2:       #181818;
  --bg3:       #222222;
  --border:    #2a2a2a;
  --border2:   #1e1e1e;
  --text:      #f0f0f0;
  --text2:     #888888;
  --text3:     #444444;
  --accent:    #f0f0f0;
  --green:     #4ade80;
  --green-bg:  rgba(74,222,128,0.08);
  --red:       #f87171;
  --red-bg:    rgba(248,113,113,0.08);
  --shadow:    0 1px 3px rgba(0,0,0,0.3);
}

html, body {
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  transition: background .2s, color .2s;
}

/* ── Layout ── */
.shell {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 0px;
  /*border-bottom: 1px solid var(--border);*/
  margin-bottom: 28px;
  position: relative;
  z-index: 1100;
}

.site-id {
  display: flex;
  align-items: center;
  gap: 10px;
}

.site-favicon {
  width: 28px; height: 28px;
  border-radius: 7px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  background: var(--bg2);
  flex-shrink: 0;
}

.site-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.02em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Period dropdown ── */
.period-dropdown { position: relative; }

.period-trigger {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 11px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.period-trigger:hover { background: var(--bg3); }
.period-trigger svg { color: var(--text3); flex-shrink: 0; }

.period-menu {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  min-width: 150px;
  box-shadow: 0 8px 24px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
  z-index: 1000;
}
[data-theme="dark"] .period-menu { box-shadow: 0 8px 24px rgba(0,0,0,.4); }
.period-menu.open { display: block; }

.period-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all .1s;
  font-family: 'Geist', sans-serif;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.period-option:hover { background: var(--bg2); color: var(--text); }
.period-option.active { color: var(--text); font-weight: 600; background: var(--bg3); }
.period-option .check { opacity: 0; font-size: 12px; }
.period-option.active .check { opacity: 1; }

/* ── Icon button ── */
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
}
.icon-btn:hover { color: var(--text); background: var(--bg3); }

/* ── Live pill ── */
.live-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--green-bg);
  background: var(--green-bg);
  cursor: pointer;
  transition: all .15s;
}
.live-pill:hover { border-color: var(--green); }

.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  position: relative;
}
.live-dot::after {
  content: '';
  position: absolute;
  inset: -3px; border-radius: 50%;
  background: var(--green);
  opacity: .25;
  animation: pulse 2s ease-out infinite;
}
@keyframes pulse {
  0%   { transform: scale(1); opacity: .25; }
  100% { transform: scale(2.6); opacity: 0; }
}

.live-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
  letter-spacing: -.01em;
}

/* ── Filter chip ── */
.filter-chip {
  display: none;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--bg2);
  width: fit-content;
  font-size: 12px;
}
.filter-chip.visible { display: flex; }
.filter-chip-label { color: var(--text2); }
.filter-chip-value { font-weight: 600; color: var(--text); }
.filter-chip-clear {
  margin-left: 4px; width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--border); border: none; cursor: pointer;
  color: var(--text2); font-size: 10px; transition: all .12s;
}
.filter-chip-clear:hover { background: var(--red-bg); color: var(--red); }

/* ── Stat grid ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
  margin-bottom: 0;
}

.stat-cell {
  background: var(--bg);
  padding: 20px 20px 16px;
  cursor: pointer;
  position: relative;
  transition: background .12s;
}
.stat-cell:first-child { border-radius: var(--radius) 0 0 0; }
.stat-cell:last-child  { border-radius: 0 var(--radius) 0 0; }
.stat-cell:hover { background: var(--bg2); }
.stat-cell.static { cursor: default; }
.stat-cell.active { background: var(--bg2); }
.stat-cell.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
}

.stat-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.stat-cell.active .stat-label { color: var(--text2); }

.stat-value {
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -.04em;
  color: var(--text);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.stat-trend {
  display: none;
  align-items: center;
  gap: 3px;
  margin-top: 5px;
  font-size: 11px;
  font-weight: 600;
}
.stat-trend.visible { display: flex; }
.stat-trend.up   { color: var(--green); }
.stat-trend.down { color: var(--red); }
.stat-trend.flat { color: var(--text3); }

/* ── Chart card ── */
.chart-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 20px 20px 16px;
  margin-bottom: 24px;
}
.chart-wrap { height: 220px; }

/* ── Data panels ── */
.section-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.panel {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg);
}
.panel-full { grid-column: span 2; }

.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 11px;
  /*border-bottom: 1px solid var(--border2);*/
}

.panel-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .07em;
}

.panel-tabs { display: flex; gap: 2px; }

.ptab2 {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .07em;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Geist', sans-serif;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all .12s;
}
.ptab2:hover { color: var(--text2); background: var(--bg2); }
.ptab2.active { color: var(--text); background: var(--bg3); }

/* ── List rows ── */
.list-body { max-height: 272px; overflow-y: auto; overflow-x: hidden; }
.list-body::-webkit-scrollbar { width: 3px; }
.list-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.list-row {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  cursor: pointer;
  position: relative;
  transition: background .1s;
  gap: 10px;
  overflow: hidden;
}
.list-row:hover { background: var(--bg2); }
.list-row:hover .list-name { text-decoration: underline; text-decoration-color: var(--border); }

.list-bar {
  position: absolute;
  top: 50%;
  left: 8px;
  transform: translateY(-50%);
  height: 28px;
  max-width: calc(100% - 8px);
  background: var(--bg3);
  border-radius: 5px;
  pointer-events: none;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] .list-bar { background: rgba(255,255,255,.04); }

.list-icon {
  width: 14px; height: 14px;
  object-fit: contain; flex-shrink: 0;
  position: relative; z-index: 1;
  border-radius: 2px;
}
.list-icon-svg {
  width: 14px; height: 14px;
  flex-shrink: 0; position: relative; z-index: 1;
  fill: var(--text3);
}
.list-flag {
  width: 16px; height: 12px;
  object-fit: cover; border-radius: 2px;
  flex-shrink: 0; position: relative; z-index: 1;
}
.list-name {
  font-size: 13px;
  font-weight: 450;
  color: var(--text);
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  position: relative; z-index: 1;
}
.list-count {
  font-size: 12px; font-weight: 600;
  color: var(--text2); font-variant-numeric: tabular-nums;
  flex-shrink: 0; position: relative; z-index: 1;
}
.list-pct {
  font-size: 11px; color: var(--text3);
  width: 36px; text-align: right;
  flex-shrink: 0; position: relative; z-index: 1;
}

.empty {
  padding: 28px 16px; text-align: center;
  font-size: 12px; color: var(--text3);
}

/* ── Live block ── */
.live-block {
  display: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
  background: var(--bg);
}
.live-block.visible { display: block; }

.live-block-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 11px;
  border-bottom: 1px solid var(--border2);
}

.live-table { width: 100%; border-collapse: collapse; }
.live-table th {
  padding: 8px 16px; text-align: left;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--text3); border-bottom: 1px solid var(--border2);
  white-space: nowrap;
}
.live-table th:nth-last-child(-n+2) { text-align: right; }
.live-table td {
  padding: 8px 16px; font-size: 12px;
  color: var(--text2); border-bottom: 1px solid var(--border2);
  white-space: nowrap;
}
.live-table tr:last-child td { border-bottom: none; }
.live-table tr:hover td { background: var(--bg2); }
.live-table td:nth-last-child(-n+2) { text-align: right; }
.live-table td:first-child { color: var(--text); font-weight: 500; }

/* ── Footer ── */
.footer {
  text-align: center; margin-top: 48px;
  font-size: 11px; color: var(--text3); letter-spacing: .02em;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .stat-grid { grid-template-columns: repeat(3, 1fr); }
  .section-grid { grid-template-columns: 1fr; }
  .panel-full { grid-column: span 1; }
  .header { flex-wrap: wrap; gap: 12px; }
}
@media (max-width: 400px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── Fade in ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.shell > * { animation: fadeUp .35s ease both; }
.shell > *:nth-child(2) { animation-delay: .05s; }
.shell > *:nth-child(3) { animation-delay: .10s; }
.shell > *:nth-child(4) { animation-delay: .15s; }
.shell > *:nth-child(5) { animation-delay: .18s; }
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="site-id">
      <div class="site-favicon">T</div>
      <span class="site-name">TEDLYTICS</span>
    </div>
    <div class="header-right">
      <button class="live-pill" onclick="toggleLiveBlock()" title="Live bezoekers">
        <div class="live-dot"></div>
        <span class="live-text"><span id="liveCount">0</span> live bezoekers</span>
      </button>
      <div class="period-dropdown" id="periodDropdown">
        <button class="period-trigger" onclick="togglePeriodMenu()" id="periodTrigger">
          <span id="periodLabel">7 dagen</span>
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="period-menu" id="periodMenu">
          <button class="period-option" onclick="setPeriod('today',this,'Vandaag')">Vandaag <span class="check">✓</span></button>
          <button class="period-option" onclick="setPeriod('yesterday',this,'Gisteren')">Gisteren <span class="check">✓</span></button>
          <button class="period-option active" onclick="setPeriod(7,this,'7 dagen')">7 dagen <span class="check">✓</span></button>
          <button class="period-option" onclick="setPeriod(30,this,'30 dagen')">30 dagen <span class="check">✓</span></button>
          <button class="period-option" onclick="setPeriod(90,this,'90 dagen')">90 dagen <span class="check">✓</span></button>
          <button class="period-option" onclick="setPeriod('all',this,'Alles')">Alles <span class="check">✓</span></button>
        </div>
      </div>
      <button class="icon-btn" onclick="toggleTheme()" title="Thema wisselen">
        <svg id="icon-sun" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="icon-moon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- FILTER CHIP -->
  <div class="filter-chip" id="filterChip">
    <span class="filter-chip-label">Filter:</span>
    <span class="filter-chip-value" id="filterLabel">—</span>
    <button class="filter-chip-clear" onclick="clearFilter()">✕</button>
  </div>

  <!-- LIVE BLOCK -->
  <div class="live-block" id="liveBlock">
    <div class="live-block-head">
      <div class="panel-title" style="display:flex;align-items:center;gap:7px;">
        <div class="live-dot"></div>
        Nu Online
      </div>
      <button class="icon-btn" onclick="toggleLiveBlock()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div style="overflow-x:auto">
      <table class="live-table">
        <thead><tr>
          <th>Land</th><th>Pagina</th><th>Apparaat</th><th>Browser</th><th>Duur</th><th>Tijd</th>
        </tr></thead>
        <tbody id="liveBody"></tbody>
      </table>
    </div>
  </div>

  <!-- STATS -->
  <div class="stat-grid">
    <div class="stat-cell active" onclick="switchMetric('visitors',this)">
      <div class="stat-label">Bezoekers</div>
      <div class="stat-value" id="vVisitors">—</div>
      <div class="stat-trend" id="tVisitors"></div>
    </div>
    <div class="stat-cell" onclick="switchMetric('views',this)">
      <div class="stat-label">Pageviews</div>
      <div class="stat-value" id="vViews">—</div>
      <div class="stat-trend" id="tViews"></div>
    </div>
    <div class="stat-cell" onclick="switchMetric('visits',this)">
      <div class="stat-label">Sessies</div>
      <div class="stat-value" id="vVisits">—</div>
      <div class="stat-trend" id="tVisits"></div>
    </div>
    <div class="stat-cell static">
      <div class="stat-label">Bounce</div>
      <div class="stat-value" id="vBounce">—</div>
      <div class="stat-trend" id="tBounce"></div>
    </div>
    <div class="stat-cell static">
      <div class="stat-label">Views / Sessie</div>
      <div class="stat-value" id="vVPV">—</div>
      <div class="stat-trend" id="tVPV"></div>
    </div>
    <div class="stat-cell static">
      <div class="stat-label">Gem. Tijd</div>
      <div class="stat-value" id="vDuration">—</div>
      <div class="stat-trend" id="tDuration"></div>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-card">
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>

  <!-- DATA PANELS -->
  <div class="section-grid">
    <div class="panel">
      <div class="panel-head"><span class="panel-title">Pagina's</span></div>
      <div class="list-body" id="pagesList"></div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">Bronnen</span></div>
      <div class="list-body" id="referrersList"></div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">Landen</span></div>
      <div class="list-body" id="countriesList"></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <div class="panel-tabs">
          <button class="ptab2 active" id="tab-browsers" onclick="switchDeviceTab('browsers')">Browsers</button>
          <button class="ptab2" id="tab-devices" onclick="switchDeviceTab('devices')">Apparaten</button>
        </div>
      </div>
      <div class="list-body" id="deviceContainer"></div>
    </div>
    <div class="panel panel-full">
      <div class="panel-head"><span class="panel-title">Events</span></div>
      <div class="list-body" id="eventsList" style="max-height:180px"></div>
    </div>
  </div>

  <div class="footer">Analytics · eigen server</div>
</div>

<script>
/* ── State ── */
let myChart = null;
let chartV = {}, chartPV = {}, chartS = {};
let currentMetric = 'visitors';
let deviceData = { browsers: {}, devices: {} };
let currentDeviceTab = 'browsers';
let currentFrom = null, currentTo = null, currentUnit = 'day';
let activeFilter = { type: null, value: null };

/* ── Theme ── */
(function(){
  const saved = localStorage.getItem('theme') || 'light';
  setTheme(saved, true);
})();

function setTheme(t, init) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  document.getElementById('icon-sun').style.display  = t === 'dark'  ? 'none' : '';
  document.getElementById('icon-moon').style.display = t === 'light' ? 'none' : '';
  if (!init && myChart) switchMetric(currentMetric, document.querySelector('.stat-cell.active'));
}
function toggleTheme() {
  setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

/* ── Icon helpers ── */
function browserIcon(name) {
  const n = name.toLowerCase();
  const paths = { chrome:'/icons/chrome.svg', safari:'/icons/safari.svg', firefox:'/icons/firefox.svg', edge:'/icons/edge.svg', opera:'/icons/opera.svg', samsung:'/icons/samsung.svg' };
  for (const [k,v] of Object.entries(paths)) if (n.includes(k)) return `<img class="list-icon" src="${v}" alt="" onerror="this.style.opacity=0">`;
  return `<svg class="list-icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.5"/></svg>`;
}
function deviceIcon(name) {
  const n = name.toLowerCase();
  if (n.includes('mobile')) return `<svg class="list-icon-svg" viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="18" x2="12" y2="18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
  if (n.includes('tablet')) return `<svg class="list-icon-svg" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>`;
  return `<svg class="list-icon-svg" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="1.5"/></svg>`;
}
function flagImg(country) {
  const code = country.split(' ').pop().toLowerCase();
  return `<img class="list-flag" src="/icons/flags/${code}.svg" alt="" onerror="this.style.display='none'">`;
}

/* ── Live block ── */
function toggleLiveBlock() {
  const b = document.getElementById('liveBlock');
  b.classList.toggle('visible');
  if (b.classList.contains('visible')) {
    b.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    loadLive();
  }
}

async function loadLive() {
  try {
    const res = await fetch('/api/stats?from=' + (currentFrom||'') + '&to=' + (currentTo||''));
    const data = await res.json();
    renderLiveTable(data);
  } catch(e) {
    document.getElementById('liveBody').innerHTML =
      '<tr><td colspan="6" style="text-align:center;padding:20px;font-size:12px;color:var(--text3);">Geen data beschikbaar</td></tr>';
  }
}

function renderLiveTable(data) {
  const tbody = document.getElementById('liveBody');
  tbody.innerHTML = '';
  const sessions = {};
  data.forEach(v => {
    if (!sessions[v.sessionId]) sessions[v.sessionId] = v;
    else if (new Date(v.timestamp) > new Date(sessions[v.sessionId].timestamp)) {
      const d = sessions[v.sessionId].duration || 0;
      sessions[v.sessionId] = v;
      sessions[v.sessionId].duration = Math.max(d, v.duration || 0);
    }
  });
  const now = new Date();
  const live = Object.values(sessions)
    .filter(v => (now - new Date(v.timestamp)) < 300000)
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  if (!live.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;font-size:12px;color:var(--text3);">Geen actieve bezoekers</td></tr>';
    return;
  }
  live.forEach(v => {
    const tr = document.createElement('tr');
    const raw = v.country || 'Onbekend';
    const code = raw.split(' ').pop().toLowerCase();
    const fi = `<img src="/icons/flags/${code}.svg" style="width:13px;height:10px;object-fit:cover;border-radius:2px;margin-right:6px;vertical-align:middle;" onerror="this.style.display='none'">`;
    const country = raw.split(' ').pop();
    const dur = v.duration || 0;
    const ds = dur < 60 ? `${dur}s` : `${Math.floor(dur/60)}m ${dur%60}s`;
    const t = new Date(v.timestamp).toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'});
    let path = ''; try { path = new URL(v.url).pathname; } catch { path = v.url; }
    tr.innerHTML = `
      <td>${fi}${country}</td>
      <td style="font-family:monospace;font-size:11px;color:var(--text2)">${path}</td>
      <td>${v.device || ''}</td>
      <td>${v.browser || ''}</td>
      <td>${ds}</td>
      <td>${t}</td>`;
    tbody.appendChild(tr);
  });
}

/* ── Render list ── */
function renderList(id, obj, type = null) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  const sorted = Object.entries(obj).sort((a, b) => b[1] - a[1]).slice(0, 10);
  if (!sorted.length) { el.innerHTML = '<div class="empty">Geen data</div>'; return; }
  const total = sorted.reduce((s, [,v]) => s + v, 0);
  const max = sorted[0][1];
  sorted.forEach(([label, count]) => {
    const pct = Math.round((count / max) * 100);
    const sharePct = Math.round((count / total) * 100);
    const row = document.createElement('div');
    row.className = 'list-row';

    let ft = '';
    if (id === 'pagesList') ft = 'url';
    else if (id === 'countriesList') ft = 'country';
    else if (id === 'referrersList') ft = 'referrer';
    else if (id === 'eventsList') ft = 'eventName';
    else if (type === 'browser') ft = 'browser';
    else if (type === 'device') ft = 'device';
    if (ft) row.onclick = () => setFilter(ft, label);

    let icon = '', display = label;
    if (type === 'browser') icon = browserIcon(label);
    else if (type === 'device') icon = deviceIcon(label);
    else if (type === 'country') { icon = flagImg(label); display = label.split(' ').pop(); }

    row.innerHTML = `
      <div class="list-bar" style="width:${pct}%"></div>
      ${icon}
      <span class="list-name" title="${label}">${display}</span>
      <span class="list-count">${count}</span>
      <span class="list-pct">${sharePct}%</span>`;
    el.appendChild(row);
  });
}

/* ── Chart ── */
function renderChart(dataObj, metric) {
  if (myChart) myChart.destroy();
  const ctx = document.getElementById('mainChart');
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  let keys = Object.keys(dataObj);
  if (keys.length && keys[0].includes(':')) keys.sort();
  else { const yr = new Date().getFullYear(); keys.sort((a, b) => new Date(a+' '+yr) - new Date(b+' '+yr)); }

  const color = isDark ? '#e5e5e5' : '#0a0a0a';
  const gridC = isDark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.05)';
  const tickC = isDark ? '#555' : '#bbb';
  const grad = ctx.getContext('2d').createLinearGradient(0, 0, 0, 220);
  grad.addColorStop(0, isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.06)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');

  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: keys,
      datasets: [{
        data: keys.map(k => dataObj[k]),
        borderColor: color,
        backgroundColor: grad,
        borderWidth: 1.5,
        tension: 0.35,
        fill: true,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHitRadius: 20,
        pointBackgroundColor: isDark ? '#111' : '#fff',
        pointBorderColor: color,
        pointBorderWidth: 1.5,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: isDark ? '#1a1a1a' : '#fff',
          padding: {x:12, y:8},
          cornerRadius: 8,
          titleFont: {family:'Geist', size:11, weight:'500'},
          bodyFont: {family:'Geist', size:16, weight:'700'},
          titleColor: isDark ? '#666' : '#aaa',
          bodyColor: isDark ? '#f0f0f0' : '#0a0a0a',
          borderColor: isDark ? '#2a2a2a' : '#e8e8e8',
          borderWidth: 1,
          displayColors: false,
          intersect: false, mode: 'index',
        }
      },
      scales: {
        y: {
          beginAtZero: true, suggestedMax: 5,
          grid: { color: gridC },
          border: { display: false, dash: [4,4] },
          ticks: { stepSize:1, maxTicksLimit:5, font:{family:'Geist', size:10, weight:'500'}, color:tickC }
        },
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: { maxRotation:0, autoSkip:true, maxTicksLimit:8, font:{family:'Geist', size:10, weight:'500'}, color:tickC }
        }
      },
      interaction: { intersect: false, mode: 'index' }
    }
  });
}

function switchMetric(m, el) {
  currentMetric = m;
  document.querySelectorAll('.stat-cell:not(.static)').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  const data = m === 'visitors' ? chartV : m === 'views' ? chartPV : chartS;
  renderChart(data, m);
}

/* ── Device tab ── */
function switchDeviceTab(tab) {
  currentDeviceTab = tab;
  document.getElementById('tab-browsers').classList.toggle('active', tab === 'browsers');
  document.getElementById('tab-devices').classList.toggle('active', tab === 'devices');
  renderList('deviceContainer', tab === 'browsers' ? deviceData.browsers : deviceData.devices, tab === 'browsers' ? 'browser' : 'device');
}

/* ── Trend ── */
function showTrend(id, curr, prev, inverse = false) {
  const el = document.getElementById(id);
  if (!prev || prev === 0) { el.classList.remove('visible'); return; }
  el.classList.add('visible');
  el.classList.remove('up', 'down', 'flat');
  const pct = Math.round(((curr - prev) / prev) * 100);
  if (pct === 0) { el.textContent = '±0%'; el.classList.add('flat'); return; }
  const good = inverse ? pct < 0 : pct > 0;
  el.textContent = `${pct > 0 ? '↑' : '↓'} ${Math.abs(pct)}%`;
  el.classList.add(good ? 'up' : 'down');
}

/* ── Metrics calculation ── */
function calcMetrics(data) {
  const ids = new Set(), sess = {};
  data.forEach(v => {
    ids.add(v.visitorId);
    if (!sess[v.sessionId]) sess[v.sessionId] = {views:0, dur:0};
    sess[v.sessionId].views++;
    sess[v.sessionId].dur += (v.duration || 0);
  });
  const total = Object.keys(sess).length;
  let single = 0, dur = 0;
  Object.values(sess).forEach(s => { if (s.views === 1) single++; dur += s.dur; });
  return {
    visitors: ids.size,
    views: data.length,
    visits: total,
    vpv: total ? (data.length / total).toFixed(1) : 0,
    bounce: total ? Math.round((single / total) * 100) : 0,
    duration: total ? Math.round(dur / total) : 0,
  };
}

/* ── Process data ── */
function processData(data, timeUnit) {
  const counts = {pages:{}, refs:{}, devs:{}, brows:{}, countries:{}, events:{}};
  chartV = {}; chartPV = {}; chartS = {};
  const sTemp = {};

  if (currentFrom && currentTo) {
    let s = new Date(currentFrom), e = new Date(currentTo);
    if (timeUnit === 'hour') {
      for (let i = 0; i < 24; i++) {
        const h = i.toString().padStart(2,'0') + ':00';
        chartPV[h] = 0; chartV[h] = new Set(); sTemp[h] = new Set();
      }
    } else {
      while (s <= e) {
        const k = s.toLocaleDateString('nl-NL', {day:'numeric', month:'short'});
        chartPV[k] = 0; chartV[k] = new Set(); sTemp[k] = new Set();
        s.setDate(s.getDate() + 1);
      }
    }
  }

  data.forEach(v => {
    const co = v.country || 'Onbekend';
    if (!counts.countries[co]) counts.countries[co] = new Set();
    counts.countries[co].add(v.visitorId);

    let p = ''; try { p = new URL(v.url).pathname; } catch { p = v.url; }
    if (!counts.pages[p]) counts.pages[p] = new Set();
    counts.pages[p].add(v.visitorId);

    let ref = v.referrer;
    if (!ref || ref === 'Direct') ref = 'Direct';
    else try { ref = new URL(ref).hostname; } catch {}
    if (!counts.refs[ref]) counts.refs[ref] = new Set();
    counts.refs[ref].add(v.visitorId);

    const dev = v.device || 'Onbekend';
    if (!counts.devs[dev]) counts.devs[dev] = new Set();
    counts.devs[dev].add(v.visitorId);

    const brow = v.browser || 'Onbekend';
    if (!counts.brows[brow]) counts.brows[brow] = new Set();
    counts.brows[brow].add(v.visitorId);

    if (v.eventName) {
      if (!counts.events[v.eventName]) counts.events[v.eventName] = new Set();
      counts.events[v.eventName].add(v.visitorId);
    }

    const d = new Date(v.timestamp);
    const key = timeUnit === 'hour'
      ? d.getHours().toString().padStart(2,'0') + ':00'
      : d.toLocaleDateString('nl-NL', {day:'numeric', month:'short'});

    if (chartPV[key] === undefined) { chartPV[key] = 0; chartV[key] = new Set(); sTemp[key] = new Set(); }
    chartPV[key]++;
    chartV[key].add(v.visitorId);
    sTemp[key].add(v.sessionId);
  });

  Object.keys(chartV).forEach(k => { if (chartV[k] instanceof Set) chartV[k] = chartV[k].size; });
  Object.keys(sTemp).forEach(k => { chartS[k] = sTemp[k] instanceof Set ? sTemp[k].size : sTemp[k]; });

  const cv = obj => { const n = {}; Object.keys(obj).forEach(k => n[k] = obj[k].size); return n; };
  renderList('pagesList', cv(counts.pages));
  renderList('referrersList', cv(counts.refs));
  renderList('countriesList', cv(counts.countries), 'country');
  renderList('eventsList', cv(counts.events));
  deviceData.browsers = cv(counts.brows);
  deviceData.devices = cv(counts.devs);
  switchDeviceTab(currentDeviceTab);
  switchMetric(currentMetric, document.querySelector('.stat-cell.active'));
}

/* ── Filter ── */
function setFilter(type, value) {
  activeFilter = {type, value};
  document.getElementById('filterChip').classList.add('visible');
  document.getElementById('filterLabel').textContent = value;
  loadData(currentFrom, currentTo, currentUnit);
}
function clearFilter() {
  activeFilter = {type: null, value: null};
  document.getElementById('filterChip').classList.remove('visible');
  loadData(currentFrom, currentTo, currentUnit);
}

/* ── Period dropdown ── */
function togglePeriodMenu() {
  document.getElementById('periodMenu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  const dd = document.getElementById('periodDropdown');
  if (dd && !dd.contains(e.target)) document.getElementById('periodMenu').classList.remove('open');
});

function fmt(d) { return d.toISOString().split('T')[0]; }

function setPeriod(range, btn, label) {
  document.querySelectorAll('.period-option').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('periodLabel').textContent = label;
  document.getElementById('periodMenu').classList.remove('open');
  const now = new Date();
  let from = null, to = null, unit = 'day';
  if (range === 'today')     { from = fmt(now); to = fmt(now); unit = 'hour'; }
  else if (range === 'yesterday') { now.setDate(now.getDate()-1); from = fmt(now); to = fmt(now); unit = 'hour'; }
  else if (range === 'all')  { /* null */ }
  else { to = fmt(now); now.setDate(now.getDate() - range); from = fmt(now); }
  loadData(from, to, unit);
}

/* ── Load data (echte API) ── */
async function loadData(from, to, unit = 'day') {
  currentFrom = from; currentTo = to; currentUnit = unit;
  try {
    const p = new URLSearchParams();
    if (from) p.append('from', from);
    if (to)   p.append('to', to);
    if (activeFilter.type && activeFilter.value) {
      p.append('filterType', activeFilter.type);
      p.append('filterValue', encodeURIComponent(activeFilter.value));
    }

    let prevUrl = null;
    if (from && to) {
      const s = new Date(from), e = new Date(to);
      const diff = Math.ceil(Math.abs(e - s) / 864e5) + 1;
      const ep = new Date(s); ep.setDate(ep.getDate() - 1);
      const sp = new Date(ep); sp.setDate(sp.getDate() - (diff - 1));
      const pp = new URLSearchParams();
      pp.append('from', fmt(sp)); pp.append('to', fmt(ep));
      if (activeFilter.type && activeFilter.value) {
        pp.append('filterType', activeFilter.type);
        pp.append('filterValue', encodeURIComponent(activeFilter.value));
      }
      prevUrl = '/api/stats?' + pp.toString();
    }

    const reqs = [fetch('/api/stats?' + p.toString())];
    if (prevUrl) reqs.push(fetch(prevUrl));
    else document.querySelectorAll('.stat-trend').forEach(el => el.classList.remove('visible'));

    const responses = await Promise.all(reqs);
    const curr = await responses[0].json();
    const prev = responses[1] ? await responses[1].json() : [];

    const cs = calcMetrics(curr), ps = calcMetrics(prev);

    document.getElementById('vVisitors').textContent = cs.visitors;
    document.getElementById('vViews').textContent    = cs.views;
    document.getElementById('vVisits').textContent   = cs.visits;
    document.getElementById('vBounce').textContent   = cs.bounce + '%';
    document.getElementById('vVPV').textContent      = cs.vpv;
    document.getElementById('vDuration').textContent = `${Math.floor(cs.duration/60)}m ${cs.duration%60}s`;

    if (prev.length) {
      showTrend('tVisitors', cs.visitors, ps.visitors);
      showTrend('tViews',    cs.views,    ps.views);
      showTrend('tVisits',   cs.visits,   ps.visits);
      showTrend('tBounce',   cs.bounce,   ps.bounce, true);
      showTrend('tVPV',      cs.vpv,      ps.vpv);
      showTrend('tDuration', cs.duration, ps.duration);
    }

    processData(curr, unit);
  } catch(e) { console.error('loadData fout:', e); }
}

/* ── Realtime ── */
async function checkLive() {
  try {
    const r = await fetch('/api/realtime');
    const d = await r.json();
    document.getElementById('liveCount').textContent = d.visitors;
    document.title = d.visitors > 0 ? `(${d.visitors}) Analytics` : 'Analytics · Mijn Website';
  } catch {}
}

/* ── Init ── */
setPeriod(7, document.querySelector('.period-option.active'), '7 dagen');
checkLive();
setInterval(checkLive, 5000);
